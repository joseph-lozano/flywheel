<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      @font-face {
        font-family: "Monaspace Radon";
        src: url("https://cdn.jsdelivr.net/gh/githubnext/monaspace@v1.101/fonts/webfonts/MonaspaceRadon-Medium.woff")
          format("woff");
        font-weight: 500;
        font-style: normal;
      }

      @font-face {
        font-family: "Monaspace Neon";
        src: url("https://cdn.jsdelivr.net/gh/githubnext/monaspace@v1.101/fonts/webfonts/MonaspaceNeon-Light.woff")
          format("woff");
        font-weight: 300;
        font-style: normal;
      }

      @font-face {
        font-family: "Monaspace Neon";
        src: url("https://cdn.jsdelivr.net/gh/githubnext/monaspace@v1.101/fonts/webfonts/MonaspaceNeon-Regular.woff")
          format("woff");
        font-weight: 400;
        font-style: normal;
      }

      @font-face {
        font-family: "Monaspace Neon";
        src: url("https://cdn.jsdelivr.net/gh/githubnext/monaspace@v1.101/fonts/webfonts/MonaspaceNeon-ExtraBold.woff")
          format("woff");
        font-weight: 800;
        font-style: normal;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1200px;
        height: 630px;
        background: #0f0f1a;
        overflow: hidden;
      }

      .terminal {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .terminal::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(ellipse at 20% 0%, rgba(200, 140, 40, 0.06) 0%, transparent 45%),
          radial-gradient(ellipse at 70% 90%, rgba(99, 102, 241, 0.04) 0%, transparent 40%);
        pointer-events: none;
      }

      .chrome {
        background: #1e1e38;
        border-bottom: 1px solid #2a2a4a;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 10px;
        position: relative;
      }

      .chrome-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
      }

      .chrome-dot:nth-child(1) {
        background: #ff5f57;
      }

      .chrome-dot:nth-child(2) {
        background: #febc2e;
      }

      .chrome-dot:nth-child(3) {
        background: #28c840;
      }

      .chrome-tab {
        margin-left: 16px;
        font-family: "Monaspace Radon", monospace;
        font-size: 14px;
        font-weight: 500;
        color: #e8a830;
        background: #0f0f1a;
        padding: 6px 16px;
        border-radius: 6px;
      }

      .content {
        padding: 44px 56px;
        position: relative;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      h1 {
        font-family: "Monaspace Neon", monospace;
        font-size: 64px;
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -2px;
        color: #e0e0f0;
        margin-bottom: 24px;
      }

      h1 .typed {
        color: #e8a830;
        border-right: 3px solid #e8a830;
        padding-right: 4px;
      }

      .subtitle {
        font-family: "Monaspace Neon", monospace;
        font-size: 20px;
        font-weight: 300;
        line-height: 1.6;
        color: #6a6a8a;
      }

      .subtitle .hl {
        color: #e8a830;
      }
    </style>
  </head>
  <body>
    <div class="terminal">
      <div class="chrome">
        <div class="chrome-dot"></div>
        <div class="chrome-dot"></div>
        <div class="chrome-dot"></div>
        <div class="chrome-tab">Flywheel</div>
      </div>
      <div class="content">
        <h1>All your dev tools,<br /><span class="typed">side by side.</span></h1>
        <p class="subtitle">
          Terminals, browsers, and processes in a single
          <span class="hl">spatial workspace</span>.
          <br />Keyboard-driven. Project-organized.
        </p>
      </div>
    </div>
  </body>
</html>
