name: Claude Auto PR

on:
  issues:
    types: [labeled]

concurrency:
  group: claude-auto-pr-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  claude-auto-pr:
    if: github.event.label.name == 'claude-auto-pr'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Comment on issue (starting)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `🤖 Claude is working on this issue. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });

      - name: Run Claude Auto PR
        id: claude-auto-pr
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-plugins-official.git"
          plugins: "superpowers@claude-plugins-official"
          claude_args: "--allowed-tools Edit,Write,WebFetch,WebSearch,Bash(git *),Bash(gh pr *),Bash(gh issue *),Bash(npm *),Bash(npx *)"
          prompt: |
            Read issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Use superpowers:writing-plans to create an implementation plan, then superpowers:executing-plans to implement it. Do not ask clarifying questions — make reasonable decisions autonomously. When complete, create a draft PR against main that closes this issue.

      - name: Comment on issue (finished)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.claude-auto-pr.outcome }}' === 'success';
            const body = success
              ? `✅ Claude finished working on this issue. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              : `❌ Claude failed to complete this issue. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });
