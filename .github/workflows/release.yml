name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package-mac:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install Apple intermediate certificate
        run: |
          curl -sO https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          sudo security import DeveloperIDG2CA.cer -k /Library/Keychains/System.keychain || echo "Certificate already in keychain, skipping"
          rm DeveloperIDG2CA.cer

      - name: Build
        run: npx electron-vite build

      - name: Package and publish
        run: npx electron-builder --mac --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload test artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: flywheel-test-dmg
          path: dist/*.dmg

  package-linux:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Build
        run: npx electron-vite build

      - name: Package and publish
        run: npx electron-builder --linux --${{ matrix.arch }} --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload test artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: flywheel-test-linux-${{ matrix.arch }}
          path: |
            dist/*.AppImage
            dist/*.deb

  release-notes:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package-mac, package-linux]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Determine tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create release on main repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.version }}"
          PRERELEASE=""
          if echo "$TAG" | grep -qE '-(alpha|beta|rc)'; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$TAG" --generate-notes $PRERELEASE

          # Clean up notes: keep only feat/fix entries, strip PR links (private repo)
          gh release view "$TAG" --json body -q .body \
            | node scripts/clean-release-notes.js \
            | gh release edit "$TAG" --notes-file -

      - name: Copy release notes to flywheel-releases
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.version }}"
          BODY=$(gh release view "$TAG" --repo joseph-lozano/flywheel --json body -q .body)
          gh release edit "$TAG" --repo joseph-lozano/flywheel-releases --notes "$BODY"

      - name: Update CHANGELOG.md in flywheel-releases
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.version }}"
          BODY=$(gh release view "$TAG" --repo joseph-lozano/flywheel --json body -q .body)

          git clone "https://x-access-token:${GH_TOKEN}@github.com/joseph-lozano/flywheel-releases.git" flywheel-releases-repo
          cd flywheel-releases-repo

          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
          fi

          # Create new entry: preserve header, prepend new version
          {
            echo "# Changelog"
            echo ""
            echo "## $TAG"
            echo ""
            echo "$BODY"
            echo ""
            tail -n +2 CHANGELOG.md
          } > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog for $TAG"
          git push
