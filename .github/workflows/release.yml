name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package-mac:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install Apple intermediate certificate
        run: |
          curl -sO https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          sudo security import DeveloperIDG2CA.cer -k /Library/Keychains/System.keychain || echo "Certificate already in keychain, skipping"
          rm DeveloperIDG2CA.cer

      - name: Build
        run: pnpm exec electron-vite build

      - name: Package and publish
        run: pnpm exec electron-builder --mac --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ github.token }}

      - name: Upload test artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: flywheel-test-dmg
          path: dist/*.dmg

  package-linux:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Build
        run: pnpm exec electron-vite build

      - name: Package and publish
        run: pnpm exec electron-builder --linux --${{ matrix.arch }} --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload test artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: flywheel-test-linux-${{ matrix.arch }}
          path: |
            dist/*.AppImage
            dist/*.deb

  release-notes:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package-mac, package-linux]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Determine tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.version }}"
          PRERELEASE=""
          if echo "$TAG" | grep -qE '-(alpha|beta|rc)'; then
            PRERELEASE="--prerelease"
          fi

          # Extract this version's section from CHANGELOG.md
          NOTES=$(awk "/^## $TAG/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)

          gh release create "$TAG" --notes "$NOTES" $PRERELEASE
