name: Import secrets and variables to Depot CI
on: push

permissions:
  id-token: write
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: depot/setup-action@v1
      - name: Import secrets
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          unset DEPOT_TOKEN
          depot ci secrets add APPLE_APP_SPECIFIC_PASSWORD --value "$APPLE_APP_SPECIFIC_PASSWORD" --repo joseph-lozano/flywheel
          depot ci secrets add APPLE_ID --value "$APPLE_ID" --repo joseph-lozano/flywheel
          depot ci secrets add APPLE_TEAM_ID --value "$APPLE_TEAM_ID" --repo joseph-lozano/flywheel
          depot ci secrets add CLAUDE_CODE_OAUTH_TOKEN --value "$CLAUDE_CODE_OAUTH_TOKEN" --repo joseph-lozano/flywheel
          depot ci secrets add CSC_KEY_PASSWORD --value "$CSC_KEY_PASSWORD" --repo joseph-lozano/flywheel
          depot ci secrets add CSC_LINK --value "$CSC_LINK" --repo joseph-lozano/flywheel
          depot ci secrets add GH_TOKEN --value "$GH_TOKEN" --repo joseph-lozano/flywheel
