name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Check for expiring secrets
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [[ "$TODAY" > "2026-05-31" ]]; then
            echo "::error::GH_TOKEN expires 2026-06-24. Rotate it now and update the secret."
            exit 1
          fi
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm test

  check-main-is-green:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Wait for main branch CI and assert it is green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"

          RUN_ID=$(gh run list \
            --repo "$REPO" \
            --branch main \
            --workflow ci.yml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::No CI runs found on main — cannot verify main is green."
            exit 1
          fi

          echo "Waiting for main CI run $RUN_ID to complete..."
          gh run watch "$RUN_ID" --repo "$REPO"

          CONCLUSION=$(gh run view "$RUN_ID" \
            --repo "$REPO" \
            --json conclusion \
            --jq '.conclusion')

          echo "Main branch CI conclusion: $CONCLUSION"

          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Main branch CI is not green (conclusion: $CONCLUSION). Fix main before merging."
            exit 1
          fi

          echo "Main branch CI is green."

  build:
    needs: lint-and-test
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: mac
          - os: ubuntu-24.04
            platform: linux
          - os: ubuntu-24.04-arm
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx electron-vite build
      - run: npx electron-builder --${{ matrix.platform }} --publish never
