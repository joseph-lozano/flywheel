name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-secrets:
    runs-on: depot-ubuntu-24.04
    steps:
      - name: Check for expiring secrets
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [[ "$TODAY" > "2026-05-31" ]]; then
            echo "::error::GH_TOKEN expires 2026-06-24. Rotate it now and update the secret."
            exit 1
          fi

  lint:
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint

  test:
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: depot-macos-15
            platform: mac
          - os: depot-ubuntu-24.04
            platform: linux
          - os: depot-ubuntu-24.04-arm
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx electron-vite build
      - run: npx electron-builder --${{ matrix.platform }} --publish never
