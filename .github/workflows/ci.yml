name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ github.event_name == 'push' || steps.diff.outputs.code == 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect changed files
        if: github.event_name == 'pull_request'
        id: diff
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$CHANGED" | grep -qE '\.(ts|tsx|js|jsx|cjs|mjs|json)$|eslint\.config|tsconfig|vitest|electron\.(vite|builder)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  lint-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check for expiring secrets
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [[ "$TODAY" > "2026-05-31" ]]; then
            echo "::error::GH_TOKEN expires 2026-06-24. Rotate it now and update the secret."
            exit 1
          fi
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm test

  build:
    needs: [changes, lint-and-test]
    if: |
      always() &&
      needs.changes.outputs.code == 'true' &&
      needs.lint-and-test.result == 'success' &&
      (github.event_name == 'push' || github.event.pull_request.draft == false)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: mac
          - os: ubuntu-24.04
            platform: linux
          - os: ubuntu-24.04-arm
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx electron-vite build
      - run: npx electron-builder --${{ matrix.platform }} --publish never

  ci-ok:
    # Use this as the single required status check in branch protection.
    # Always runs and reports success only if no upstream job failed.
    if: always()
    needs: [lint-and-test, build]
    runs-on: ubuntu-24.04
    steps:
      - run: |
          [[ "${{ needs.lint-and-test.result }}" =~ ^(success|skipped)$ ]] &&
          [[ "${{ needs.build.result }}" =~ ^(success|skipped)$ ]]
