<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 60px;
        overflow: hidden;
        background: #1a1a2e;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #titlebar {
        height: 32px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        font-size: 13px;
        font-weight: 400;
        color: #666;
        background: #1a1a2e;
        user-select: none;
        border-bottom: 1px solid #2a2a3e;
        box-sizing: border-box;
        /* no border-radius — the focus border in the chrome view provides the rounded corners */
      }
      #titlebar.focused {
        font-weight: 500;
        color: #e0e0e0;
        background: #252540;
      }
      #titlebar .pos {
        flex-shrink: 0;
        margin-right: 6px;
      }
      #titlebar .globe {
        flex-shrink: 0;
        margin-right: 6px;
        color: #06b6d4;
        display: flex;
        align-items: center;
      }
      #titlebar .title {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 12px;
        color: #555;
      }
      #titlebar.focused .title {
        color: #c0c0c0;
      }
      #navbar {
        height: 28px;
        display: flex;
        align-items: center;
        padding: 0 8px;
        background: #1e1e36;
        gap: 4px;
        box-sizing: border-box;
        border-bottom: 1px solid #2a2a3e;
      }
      #navbar.focused {
        border-bottom: 2px solid #6366f1;
      }
      .nav-btn {
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        cursor: pointer;
        border: none;
        background: transparent;
        color: #888;
        padding: 0;
        flex-shrink: 0;
      }
      .nav-btn:disabled {
        color: #444;
        cursor: default;
      }
      .nav-sep {
        width: 1px;
        height: 16px;
        background: #333;
        flex-shrink: 0;
      }
      #url-display {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: monospace;
        font-size: 12px;
        color: #888;
        cursor: text;
      }
      #url-input {
        flex: 1;
        background: #1a1a2e;
        border: 1px solid #3a3a5c;
        border-radius: 3px;
        color: #e0e0e0;
        font-size: 12px;
        font-family: monospace;
        padding: 2px 6px;
        outline: none;
        height: 22px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="titlebar">
      <span class="pos" id="pos-label"></span>
      <span id="dot-grid"></span>
      <span class="globe" id="globe-icon"></span>
      <span class="title" id="title-label">about:blank</span>
    </div>
    <div id="navbar">
      <button class="nav-btn" id="btn-back" disabled></button>
      <button class="nav-btn" id="btn-forward" disabled></button>
      <div class="nav-sep"></div>
      <span id="url-display">about:blank</span>
      <input type="text" id="url-input" />
      <button class="nav-btn" id="btn-reload"></button>
    </div>
    <script type="module" src="./browser-host.ts"></script>
  </body>
</html>
