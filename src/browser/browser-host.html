<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      @font-face {
        font-family: "Monaspace Neon";
        src: url("../renderer/assets/fonts/MonaspaceNeon-Light.woff") format("woff");
        font-weight: 300;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Monaspace Neon";
        src: url("../renderer/assets/fonts/MonaspaceNeon-Regular.woff") format("woff");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 60px;
        overflow: hidden;
        background: #1e1e38;
        font-family: "Monaspace Neon", monospace;
      }
      #titlebar {
        height: 32px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        font-size: 13px;
        font-weight: 400;
        color: #6a6a8a;
        background: #1e1e38;
        user-select: none;
        border-bottom: 1px solid #2a2a4a;
        box-sizing: border-box;
        /* no border-radius — the focus border in the chrome view provides the rounded corners */
      }
      #titlebar.focused {
        font-weight: 500;
        color: #e0e0f0;
        background: #252540;
      }
      #titlebar .pos {
        flex-shrink: 0;
        margin-right: 6px;
      }
      #titlebar .globe {
        flex-shrink: 0;
        margin-right: 6px;
        color: #06b6d4;
        display: flex;
        align-items: center;
      }
      #titlebar .title {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 12px;
        color: #555;
      }
      #titlebar.focused .title {
        color: #c0c0c0;
      }
      #btn-close {
        flex-shrink: 0;
        margin-left: 6px;
        width: 18px;
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        cursor: pointer;
        border: none;
        background: transparent;
        color: #555;
        padding: 0;
        opacity: 0;
        transition:
          opacity 0.1s,
          color 0.1s;
      }
      #titlebar:hover #btn-close {
        opacity: 1;
      }
      #btn-close:hover {
        color: #e0e0f0;
        background: rgba(255, 255, 255, 0.08);
      }
      #navbar {
        height: 28px;
        display: flex;
        align-items: center;
        padding: 0 8px;
        background: #1e1e36;
        gap: 4px;
        box-sizing: border-box;
        border-bottom: 1px solid #2a2a4a;
      }
      #navbar.focused {
        border-bottom: 2px solid #e8a830;
      }
      .nav-btn {
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        cursor: pointer;
        border: none;
        background: transparent;
        color: #6a6a8a;
        padding: 0;
        flex-shrink: 0;
      }
      .nav-btn:disabled {
        color: #444;
        cursor: default;
      }
      .nav-sep {
        width: 1px;
        height: 16px;
        background: #333;
        flex-shrink: 0;
      }
      #url-display {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: "Monaspace Neon", monospace;
        font-size: 12px;
        color: #6a6a8a;
        cursor: text;
      }
      #url-input {
        flex: 1;
        background: #1e1e38;
        border: 1px solid #3a3a5c;
        border-radius: 3px;
        color: #e0e0f0;
        font-size: 12px;
        font-family: "Monaspace Neon", monospace;
        padding: 2px 6px;
        outline: none;
        height: 22px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="titlebar">
      <span class="pos" id="pos-label"></span>
      <span id="dot-grid"></span>
      <span class="globe" id="globe-icon"></span>
      <span class="title" id="title-label">about:blank</span>
      <button id="btn-close" title="Close panel"></button>
    </div>
    <div id="navbar">
      <button class="nav-btn" id="btn-back" disabled></button>
      <button class="nav-btn" id="btn-forward" disabled></button>
      <div class="nav-sep"></div>
      <span id="url-display">about:blank</span>
      <input type="text" id="url-input" />
      <button class="nav-btn" id="btn-reload"></button>
      <button class="nav-btn" id="btn-devtools" title="Toggle DevTools"></button>
    </div>
    <script type="module" src="./browser-host.ts"></script>
  </body>
</html>
