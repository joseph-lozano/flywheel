<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
      }
      #panel-titlebar {
        height: 32px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        font-size: 13px;
        font-weight: 400;
        color: #666;
        background: #1a1a2e;
        user-select: none;
        border-bottom: 1px solid #2a2a3e;
        box-sizing: border-box;
        /* no border-radius — the focus border in the chrome view provides the rounded corners */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #panel-titlebar.focused {
        font-weight: 500;
        color: #e0e0e0;
        background: #252540;
        border-bottom-color: #6366f1;
        border-bottom-width: 2px;
      }
      #pos-label {
        flex-shrink: 0;
      }
      #title-label {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #btn-close {
        flex-shrink: 0;
        margin-left: 6px;
        width: 18px;
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        cursor: pointer;
        border: none;
        background: transparent;
        color: #555;
        padding: 0;
        opacity: 0;
        transition:
          opacity 0.1s,
          color 0.1s;
      }
      #panel-titlebar:hover #btn-close {
        opacity: 1;
      }
      #btn-close:hover {
        color: #e0e0e0;
        background: rgba(255, 255, 255, 0.08);
      }
      #terminal {
        width: calc(100% - 16px);
        height: calc(100% - 40px);
        padding: 8px;
        box-sizing: border-box;
      }
      #terminal.drag-over {
        border: 2px solid #6366f1;
      }
    </style>
  </head>
  <body>
    <div id="panel-titlebar">
      <span id="pos-label"></span>
      <span id="dot-grid"></span>
      <span id="title-label"></span>
      <button id="btn-close" title="Close panel"></button>
    </div>
    <div id="terminal"></div>
    <script type="module" src="./terminal.ts"></script>
  </body>
</html>
