<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      @font-face {
        font-family: "Monaspace Neon";
        src: url("../renderer/assets/fonts/MonaspaceNeon-Light.woff") format("woff");
        font-weight: 300;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "Monaspace Neon";
        src: url("../renderer/assets/fonts/MonaspaceNeon-Regular.woff") format("woff");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1e1e38;
      }
      body.drag-files-active #terminal {
        background: rgba(232, 168, 48, 0.08);
        box-shadow: inset 0 0 0 1px rgba(232, 168, 48, 0.65);
      }
      #panel-titlebar {
        height: 32px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        font-size: 13px;
        font-weight: 400;
        color: #6a6a8a;
        background: #1e1e38;
        user-select: none;
        border-bottom: 1px solid #2a2a4a;
        box-sizing: border-box;
        /* no border-radius — the focus border in the chrome view provides the rounded corners */
        font-family: "Monaspace Neon", monospace;
      }
      #panel-titlebar.focused {
        font-weight: 500;
        color: #e0e0f0;
        background: #252540;
        border-bottom-color: #e8a830;
        border-bottom-width: 2px;
      }
      #pos-label {
        flex-shrink: 0;
      }
      #title-label {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #btn-close {
        flex-shrink: 0;
        margin-left: 6px;
        width: 18px;
        height: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        cursor: pointer;
        border: none;
        background: transparent;
        color: #555;
        padding: 0;
        opacity: 0;
        transition:
          opacity 0.1s,
          color 0.1s;
      }
      #panel-titlebar:hover #btn-close {
        opacity: 1;
      }
      #btn-close:hover {
        color: #e0e0f0;
        background: rgba(255, 255, 255, 0.08);
      }
      #terminal {
        width: calc(100% - 16px);
        height: calc(100% - 40px);
        padding: 8px;
        box-sizing: border-box;
        transition:
          background 0.12s ease,
          box-shadow 0.12s ease;
      }
    </style>
  </head>
  <body>
    <div id="panel-titlebar">
      <span id="pos-label"></span>
      <span id="dot-grid"></span>
      <span id="title-label"></span>
      <button id="btn-close" title="Close panel"></button>
    </div>
    <div id="terminal"></div>
    <script type="module" src="./terminal.ts"></script>
  </body>
</html>
