<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background: #1a1a2e;
    }
    #panel-titlebar {
      height: 32px; display: flex; align-items: center;
      padding: 0 12px; font-size: 13px; font-weight: 400;
      color: #666; background: #1a1a2e; user-select: none;
      border-bottom: 1px solid #2a2a3e; box-sizing: border-box;
      /* no border-radius — the focus border in the chrome view provides the rounded corners */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #panel-titlebar.focused { font-weight: 500; color: #e0e0e0; background: #252540; border-bottom-color: #6366f1; border-bottom-width: 2px; }
    #terminal {
      width: calc(100% - 16px);
      height: calc(100% - 40px);
      padding: 8px;
    }
  </style>
</head>
<body>
  <div id="panel-titlebar"></div>
  <div id="terminal"></div>
  <script type="module" src="./terminal.ts"></script>
</body>
</html>
